<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FinanceHub — Transactions</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">💎</div>
      <div class="sidebar-logo-text">FinanceHub</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Main</div>
      <a href="dashboard.html" class="nav-link"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="transfer.html" class="nav-link"><span class="nav-icon">💸</span> Transfer Money</a>
      <a href="transactions.html" class="nav-link active"><span class="nav-icon">📋</span> Transactions</a>
      <div id="admin-nav-section" class="hidden">
        <div class="nav-label">Management</div>
        <a href="admin.html" class="nav-link"><span class="nav-icon">⚙️</span> Admin Panel</a>
      </div>
    </nav>
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebar-avatar"></div>
      <div class="user-info">
        <div class="user-name" id="sidebar-name"></div>
        <div id="sidebar-role"></div>
      </div>
      <button class="logout-btn" onclick="logout()" title="Sign out">⏻</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header">
      <h1>Transaction History</h1>
      <p>Full record of all your account activity</p>
    </div>

    <div class="card">
      <!-- Tab Navigation -->
      <div class="tab-nav">
        <button class="tab-btn active" onclick="setTab('all',this)">All</button>
        <button class="tab-btn" onclick="setTab('sent',this)">Sent</button>
        <button class="tab-btn" onclick="setTab('received',this)">Received</button>
        <button class="tab-btn" onclick="setTab('pending',this)">Pending</button>
      </div>

      <!-- Search -->
      <div class="filter-bar">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search by description…" class="form-group" style="padding:11px 16px 11px 40px;width:100%;"/>
        </div>
        <div id="tx-count" class="text-muted"></div>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Description</th>
              <th>Counterparty</th>
              <th>Type</th>
              <th style="text-align:right">Amount</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tx-body">
            <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">Loading transactions…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/transactions.js"></script>
</body>
</html>
