<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FinanceHub — Sign In</title>
  <meta name="description" content="Sign in to your FinanceHub account — premium digital banking."/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-page">

  <!-- Left: Brand Panel -->
  <div class="auth-brand">
    <div class="geo-ring geo-ring-1"></div>
    <div class="geo-ring geo-ring-2"></div>
    <div class="geo-ring geo-ring-3"></div>

    <div class="brand-logo-wrap">
      <div class="brand-logo-icon">💎</div>
      <div class="brand-name">FinanceHub</div>
      <div class="brand-tagline">Premium Digital Banking Experience</div>
    </div>

    <div class="brand-features">
      <div class="brand-feature">
        <span class="brand-feature-icon">🔐</span>
        <span class="brand-feature-text">Bank-grade security protecting your assets 24/7</span>
      </div>
      <div class="brand-feature">
        <span class="brand-feature-icon">⚡</span>
        <span class="brand-feature-text">Instant transfers, real-time balance updates</span>
      </div>
      <div class="brand-feature">
        <span class="brand-feature-icon">📊</span>
        <span class="brand-feature-text">Full transaction history & advanced analytics</span>
      </div>
    </div>
  </div>

  <!-- Right: Form Panel -->
  <div class="auth-form-panel">
    <h2>Welcome Back</h2>
    <p class="auth-subtitle">Sign in to access your account</p>

    <form class="auth-form" id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required/>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-group">
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required/>
          <button type="button" class="toggle-pw" onclick="togglePassword('password', this)" title="Show/hide password">👁</button>
        </div>
      </div>

      <div class="forgot-link">
        <a href="forgot-password.html">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-gold btn-block" id="login-btn">
        Sign In
      </button>
    </form>

    <div class="auth-link">
      Don't have an account? <a href="register.html">Create account</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
