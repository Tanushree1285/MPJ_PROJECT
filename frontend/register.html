<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FinanceHub — Create Account</title>
  <meta name="description" content="Create your FinanceHub account and start banking smarter."/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-page">

  <!-- Left: Brand Panel -->
  <div class="auth-brand">
    <div class="geo-ring geo-ring-1"></div>
    <div class="geo-ring geo-ring-2"></div>
    <div class="geo-ring geo-ring-3"></div>

    <div class="brand-logo-wrap">
      <div class="brand-logo-icon">💎</div>
      <div class="brand-name">FinanceHub</div>
      <div class="brand-tagline">Premium Digital Banking Experience</div>
    </div>

    <div class="brand-features">
      <div class="brand-feature">
        <span class="brand-feature-icon">🎁</span>
        <span class="brand-feature-text">Welcome bonus: $1,000 credited on account creation</span>
      </div>
      <div class="brand-feature">
        <span class="brand-feature-icon">🌍</span>
        <span class="brand-feature-text">Global transfers with zero hidden fees</span>
      </div>
      <div class="brand-feature">
        <span class="brand-feature-icon">📱</span>
        <span class="brand-feature-text">Manage your wealth from any device, anywhere</span>
      </div>
    </div>
  </div>

  <!-- Right: Form Panel -->
  <div class="auth-form-panel">
    <h2>Create Account</h2>
    <p class="auth-subtitle">Join FinanceHub and bank smarter</p>

    <form class="auth-form" id="register-form">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" placeholder="Jane Doe" autocomplete="name" required/>
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="jane.doe" autocomplete="username" required/>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required/>
      </div>

      <div class="form-group">
        <label for="phone">Phone (optional)</label>
        <input type="tel" id="phone" placeholder="+1-555-0100"/>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-group">
          <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" required minlength="8"/>
          <button type="button" class="toggle-pw" onclick="togglePassword('password', this)" title="Show/hide password">👁</button>
        </div>
      </div>

      <button type="submit" class="btn btn-gold btn-block" id="register-btn">
        Create Account
      </button>
    </form>

    <div class="auth-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
