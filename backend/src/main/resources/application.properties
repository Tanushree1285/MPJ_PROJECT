# ============================================================
# FinanceHub — application.properties
# ============================================================

spring.application.name=financehub

# ============================================================
# DATABASE — update these three lines with your MySQL details
# ============================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# Mail — update with your SMTP details for Forgot Password
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
# ============================================================
# FinanceHub custom properties
# ============================================================
# Frontend base URL — used in password-reset email links
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}
# Token expiry in minutes
app.password-reset.expiry-minutes=30
